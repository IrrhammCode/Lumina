<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#E8EBE6" />
    <title>Lumina</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #e8ebe6;
        color: #0e0f0c;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
      }
      .mark {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 1rem;
        background: #f0b429;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 1.5rem;
      }
      p { font-size: 0.9rem; color: #454745; text-align: center; max-width: 16rem; line-height: 1.45; }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true">L</div>
    <p>Loading Lumina…</p>
    <p style="font-size: 0.75rem; color: #868685;">
      Set <code>CAPACITOR_SERVER_URL</code> before building for TestFlight.
    </p>
  </body>
</html>
