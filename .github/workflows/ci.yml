name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_MAGIC_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_UA_TREASURY: "0x0000000000000000000000000000000000000001"
          JWT_SECRET: ci-build-secret